<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>POCKET BEAT ★ 레트로 리듬게임</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&display=swap');
:root{--ink:#30264b;--pink:#ff5c8a;--cream:#fff4d8;--mint:#43d9bd;--yellow:#ffd65a;--purple:#7865d6}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;overflow:hidden;background:#171329;color:var(--ink);font-family:'Gowun Dodum',sans-serif;touch-action:none}
body{display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,#51458b 0,#252044 45%,#100e20 100%)}
.cabinet{position:relative;width:min(100vw,780px);height:100dvh;max-height:920px;background:var(--cream);overflow:hidden;box-shadow:0 0 0 7px #30264b,0 0 0 13px #ff5c8a,0 20px 70px #0009}
.cabinet:after{content:"";pointer-events:none;position:absolute;inset:0;z-index:20;background:repeating-linear-gradient(0deg,#0000 0 3px,#31224a14 3px 4px);mix-blend-mode:multiply}
header{height:112px;background:var(--yellow);border-bottom:6px solid var(--ink);padding:12px 18px;position:relative;z-index:2}
.brand{font-family:'Black Han Sans',sans-serif;font-size:clamp(24px,5vw,40px);letter-spacing:2px;color:var(--pink);text-shadow:3px 3px 0 #fff,5px 5px 0 var(--ink);transform:rotate(-1deg)}
.brand small{font:700 12px 'Gowun Dodum';color:var(--ink);text-shadow:none;letter-spacing:1px;margin-left:7px}
.hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:9px;font-size:12px;font-weight:900}.stat{background:#fff;border:3px solid var(--ink);box-shadow:3px 3px 0 var(--ink);padding:3px 8px}.stat b{float:right;color:var(--pink);font-size:15px}.timebar{position:absolute;left:0;bottom:-6px;height:6px;background:var(--mint);width:100%;transition:width .15s linear}
#game{height:calc(100% - 112px);position:relative;background:linear-gradient(90deg,#ffe4e7 0 25%,#e9e5ff 25% 50%,#dcfaef 50% 75%,#fff0c8 75%);overflow:hidden}
.lanes{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr)}.lane{border-right:3px dashed #30264b30;position:relative}.lane:last-child{border:0}
.hitline{position:absolute;left:0;right:0;bottom:104px;height:7px;background:var(--ink);box-shadow:0 0 0 4px #fff7,0 0 18px var(--pink);z-index:4}
.keyrow{position:absolute;left:0;right:0;bottom:12px;height:78px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 12px;z-index:7}.key{border:4px solid var(--ink);border-radius:13px;background:#fff;box-shadow:0 7px 0 var(--ink);font:900 27px 'Black Han Sans';color:var(--ink);cursor:pointer;transition:.06s;display:grid;place-items:center}.key span{font:700 10px 'Gowun Dodum';display:block;margin-top:-12px}.key.active{transform:translateY(6px);box-shadow:0 1px 0 var(--ink);background:var(--yellow)}
.note{position:absolute;width:calc(25% - 18px);height:28px;left:calc(var(--lane)*25% + 9px);top:-34px;border:4px solid var(--ink);border-radius:10px;z-index:3;box-shadow:0 5px 0 #30264b44}.note:before{content:var(--face);position:absolute;inset:-8px 0 0;text-align:center;font-size:20px}.note[data-l="0"]{background:#ff7099}.note[data-l="1"]{background:#8d7be8}.note[data-l="2"]{background:#52dfc4}.note[data-l="3"]{background:#ffd65a}
.judge{position:absolute;left:50%;bottom:165px;z-index:8;transform:translateX(-50%);font:42px 'Black Han Sans';color:#fff;text-shadow:3px 3px 0 var(--ink),-2px -2px 0 var(--ink);opacity:0}.judge.pop{animation:pop .45s ease-out}.combo{position:absolute;right:14px;top:18px;text-align:right;font:18px 'Black Han Sans';z-index:5;color:var(--ink)}.combo b{font-size:38px;color:var(--pink);display:block;line-height:.8;text-shadow:2px 2px #fff}
.pet{position:absolute;left:12px;top:18px;z-index:5;font-size:48px;filter:drop-shadow(3px 4px 0 #fff);animation:bop .45s infinite alternate ease-in-out}.pet.sad{filter:grayscale(1);animation:shake .15s 2}
.overlay{position:absolute;inset:0;z-index:15;background:#30264bea;display:grid;place-items:center;padding:24px;text-align:center;color:#fff}.card{width:min(480px,95%);background:var(--cream);color:var(--ink);border:6px solid var(--ink);border-radius:20px;box-shadow:9px 9px 0 var(--pink);padding:24px}.card h1{font:clamp(32px,8vw,54px) 'Black Han Sans';margin:0;color:var(--pink);text-shadow:3px 3px 0 #fff,5px 5px 0 var(--ink)}.card p{line-height:1.6;margin:14px 0}.start{border:4px solid var(--ink);background:var(--mint);box-shadow:5px 6px 0 var(--ink);padding:13px 30px;border-radius:10px;font:24px 'Black Han Sans';color:var(--ink);cursor:pointer}.start:active{transform:translate(4px,5px);box-shadow:1px 1px 0 var(--ink)}.legend{display:flex;justify-content:center;gap:7px}.legend i{font-style:normal;background:#fff;border:2px solid var(--ink);border-radius:5px;padding:4px 9px;font-weight:bold}.hidden{display:none}.spark{position:absolute;z-index:9;pointer-events:none;font-size:25px;animation:spark .55s forwards}
@keyframes pop{0%{opacity:1;transform:translateX(-50%) scale(.4)}45%{opacity:1;transform:translateX(-50%) scale(1.25)}100%{opacity:0;transform:translateX(-50%) translateY(-35px)}}@keyframes bop{to{transform:translateY(7px) rotate(4deg)}}@keyframes shake{50%{transform:translateX(8px)}}@keyframes spark{to{transform:translate(var(--x),-70px) rotate(180deg);opacity:0}}
@media(max-height:650px){header{height:91px;padding:5px 14px}.brand{font-size:25px}.hud{margin-top:3px}.stat{padding:1px 5px}#game{height:calc(100% - 91px)}.keyrow{height:60px}.hitline{bottom:82px}.judge{bottom:125px}}
</style>
</head>
<body>
<main class="cabinet">
 <header><div class="brand">POCKET BEAT ★ <small>두근두근 아케이드</small></div><div class="hud"><div class="stat">SCORE <b id="score">000000</b></div><div class="stat">LEVEL <b id="level">1</b></div><div class="stat">TIME <b id="time">60</b></div></div><div class="timebar" id="timebar"></div></header>
 <section id="game"><div class="lanes"><div class="lane"></div><div class="lane"></div><div class="lane"></div><div class="lane"></div></div><div class="pet" id="pet">🐰</div><div class="combo"><b id="combo">0</b>COMBO</div><div class="judge" id="judge">PERFECT!</div><div class="hitline"></div><div class="keyrow"><button class="key" data-key="0">D<span>딸기</span></button><button class="key" data-key="1">F<span>포도</span></button><button class="key" data-key="2">J<span>민트</span></button><button class="key" data-key="3">K<span>레몬</span></button></div>
  <div class="overlay" id="startScreen"><div class="card"><h1>POCKET<br>BEAT!</h1><p>비트에 맞춰 내려오는 친구들을 잡아요!<br>60초 동안 최고 점수에 도전 ♪</p><div class="legend"><i>D</i><i>F</i><i>J</i><i>K</i></div><p>키보드 또는 아래 버튼을 터치하세요.</p><button class="start" id="startBtn">START ♫</button></div></div>
  <div class="overlay hidden" id="endScreen"><div class="card"><h1>FINISH!</h1><p id="result"></p><button class="start" id="retryBtn">다시 하기 ↻</button></div></div>
 </section>
</main>
<script>
(()=>{'use strict';
const game=document.querySelector('#game'),keys=[...document.querySelectorAll('.key')],faces=['♥','★','●','♪'];
const $=id=>document.getElementById(id); let running=false,notes=[],score=0,combo=0,level=1,time=60,last=0,spawnClock=0,startAt=0,audio,musicTimer=null,beat=0;
function tone(freq,dur=.08,type='square',vol=.045){if(!audio)return;let o=audio.createOscillator(),g=audio.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,audio.currentTime);g.gain.exponentialRampToValueAtTime(.001,audio.currentTime+dur);o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+dur)}
// 외부 음원 없이 Web Audio로 연주하는 오리지널 8비트 BGM
const melody=[523,659,784,659,587,698,880,698,659,784,988,784,698,659,587,494,523,659,784,1047,988,784,659,587,523,659,698,784,659,587,523,392];
const bass=[131,131,147,147,165,165,147,147,131,131,147,147,175,165,147,123];
function drum(){if(!audio)return;let len=audio.sampleRate*.045,b=audio.createBuffer(1,len,audio.sampleRate),d=b.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);let s=audio.createBufferSource(),g=audio.createGain();s.buffer=b;g.gain.value=.035;s.connect(g).connect(audio.destination);s.start()}
function musicTick(){if(!running)return;let m=melody[beat%melody.length];if(beat%2===0)tone(m,.12,'square',.018);else tone(m/2,.07,'square',.011);if(beat%4===0){tone(bass[Math.floor(beat/4)%bass.length],.22,'triangle',.035);drum()}if(beat%8===4)drum();beat++}
function musicLoop(){musicTick();musicTimer=setTimeout(musicLoop,Math.max(98,125-(level-1)*3))}
function startMusic(){clearTimeout(musicTimer);beat=0;musicLoop()}
function stopMusic(){clearTimeout(musicTimer);musicTimer=null}
function spawn(){let lane=Math.floor(Math.random()*4),el=document.createElement('div');el.className='note';el.dataset.l=lane;el.style.setProperty('--lane',lane);el.style.setProperty('--face',`'${faces[lane]}'`);game.append(el);notes.push({el,lane,y:-34,hit:false})}
function updateHud(){ $('score').textContent=String(score).padStart(6,'0');$('combo').textContent=combo;$('level').textContent=level;$('time').textContent=Math.max(0,Math.ceil(time));$('timebar').style.width=(time/60*100)+'%'}
function say(text,color){let j=$('judge');j.textContent=text;j.style.color=color;j.classList.remove('pop');void j.offsetWidth;j.classList.add('pop')}
function sparkle(lane){for(let i=0;i<5;i++){let s=document.createElement('i');s.className='spark';s.textContent=['★','♥','✦'][i%3];s.style.left=(lane*25+12.5)+'%';s.style.bottom='103px';s.style.color=['#ff5c8a','#43d9bd','#ffd65a'][i%3];s.style.setProperty('--x',(Math.random()*100-50)+'px');game.append(s);setTimeout(()=>s.remove(),600)}}
function miss(n){n.hit=true;n.el.remove();combo=0;say('MISS','#9b91ae');$('pet').classList.add('sad');setTimeout(()=>$('pet').classList.remove('sad'),300);tone(90,.13,'sawtooth',.025)}
function hit(lane){if(!running)return;keys[lane].classList.add('active');setTimeout(()=>keys[lane].classList.remove('active'),90);let targetY=game.clientHeight-111,best=null,dist=999;notes.forEach(n=>{let d=Math.abs(n.y-targetY);if(!n.hit&&n.lane===lane&&d<dist){dist=d;best=n}});if(!best||dist>65){combo=0;say('OOPS!','#9b91ae');tone(120,.08);updateHud();return}best.hit=true;best.el.remove();combo++;let add;if(dist<22){add=300;say('PERFECT!','#ff5c8a');sparkle(lane)}else{add=150;say('GOOD!','#43d9bd')}score+=add*level+combo*5;tone([261.6,329.6,392,523.3][lane],.1,'square',.04);updateHud()}
function frame(t){if(!running)return;let dt=Math.min((t-last)/1000,.035);last=t;time=60-(t-startAt)/1000;level=Math.min(10,1+Math.floor((60-time)/10));let speed=175+(level-1)*18,interval=Math.max(.26,.62-(level-1)*.035);spawnClock+=dt;if(spawnClock>=interval){spawnClock=0;spawn();if(Math.random()<Math.min(.22,level*.025))setTimeout(()=>running&&spawn(),110)}let hitY=game.clientHeight-111;notes.forEach(n=>{if(n.hit)return;n.y+=speed*dt;n.el.style.transform=`translateY(${n.y}px)`;if(n.y>hitY+72)miss(n)});notes=notes.filter(n=>!n.hit);updateHud();if(time<=0)return end();requestAnimationFrame(frame)}
function start(){audio=audio||new(window.AudioContext||window.webkitAudioContext)();audio.resume();notes.forEach(n=>n.el.remove());notes=[];score=combo=spawnClock=0;level=1;time=60;running=true;$('startScreen').classList.add('hidden');$('endScreen').classList.add('hidden');startAt=performance.now();last=startAt;startMusic();requestAnimationFrame(frame)}
function end(){running=false;stopMusic();notes.forEach(n=>n.el.remove());notes=[];let rank=score>30000?'리듬 마스터 🏆':score>15000?'반짝 스타 ⭐':'새싹 DJ 🌱';$('result').innerHTML=`최종 점수 <b style="font-size:28px;color:#ff5c8a">${score.toLocaleString()}</b><br>최고 콤보까지 신나게 연주했어요!<br><b>${rank}</b>`;$('endScreen').classList.remove('hidden');tone(392,.2);setTimeout(()=>tone(330,.25),180)}
document.addEventListener('keydown',e=>{let i=['KeyD','KeyF','KeyJ','KeyK'].indexOf(e.code);if(i>=0&&!e.repeat){e.preventDefault();hit(i)}});keys.forEach(k=>{k.addEventListener('pointerdown',e=>{e.preventDefault();hit(+k.dataset.key)})});$('startBtn').onclick=start;$('retryBtn').onclick=start;
})();
</script>
</body></html>
