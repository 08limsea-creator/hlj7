<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포춘 메세지</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #FFF587;
      background-attachment: fixed;
      color: #333;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .entry-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: transparent;
    }

    .entry-card {
      width: 100%;
      max-width: 420px;
      padding: 34px 24px;
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 16px 36px rgba(163, 111, 18, 0.18);
      text-align: center;
    }

    .entry-emoji {
      display: block;
      margin-bottom: 10px;
      font-size: 74px;
      line-height: 1;
    }

    .entry-title {
      margin: 0 0 10px;
      color: #f47a20;
      font-size: 28px;
      font-weight: 900;
    }

    .entry-description {
      margin: 0 0 22px;
      color: #777;
      font-size: 14px;
      line-height: 1.7;
    }

    .phone-input {
      width: 100%;
      height: 54px;
      padding: 0 16px;
      border: 2px solid #ffd0a5;
      border-radius: 16px;
      outline: none;
      background: #fffaf6;
      color: #333;
      font-size: 18px;
      text-align: center;
    }

    .phone-input:focus {
      border-color: #ff8a2b;
      box-shadow: 0 0 0 4px rgba(255, 138, 43, 0.12);
    }

    .start-button,
    .retry-button {
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(90deg, #ff9a3c, #ff6b2b);
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(255, 107, 43, 0.25);
    }

    .start-button {
      margin-top: 14px;
    }

    .entry-error {
      min-height: 20px;
      margin: 10px 0 0;
      color: #e15555;
      font-size: 13px;
    }

    .app {
      display: none;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 28px 16px 36px;
      text-align: center;
    }

    .app.active {
      display: block;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin: 0 0 24px;
      color: #f47a20;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.2;
    }

    .card {
      width: 100%;
      margin-top: 18px;
      padding: 24px 20px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 12px 28px rgba(163, 111, 18, 0.16);
    }

    .fortune-text {
      margin: 0;
      color: #333;
      font-size: 15px;
      line-height: 1;
      white-space: pre-line;
      word-break: keep-all;
      overflow-wrap: break-word;
      text-wrap: pretty;
    }

    .scores {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px dashed #edc58f;
    }

    .score-row {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) 48px;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .score-row:first-child {
      margin-top: 0;
    }

    .score-label {
      color: #555;
      font-size: 14px;
      font-weight: 800;
      text-align: left;
    }

    .score-track {
      width: 100%;
      height: 14px;
      overflow: hidden;
      background: #ffe4cf;
      border-radius: 999px;
    }

    .score-fill {
      width: 0;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff9a3c, #ff6b2b);
      transition: width 0.8s ease;
    }

    .score-value {
      color: #ff6b2b;
      font-size: 14px;
      font-weight: 900;
      text-align: right;
      white-space: nowrap;
    }

    .card-title {
      margin: 0 0 14px;
      color: #f47a20;
      font-size: 22px;
      font-weight: 900;
    }

    .keyword-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .keyword-item {
      display: grid;
      grid-template-columns: 34px 58px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 10px 0;
    }

    .keyword-item + .keyword-item {
      border-top: 1px solid #e9e9e9;
    }

    .keyword-icon {
      font-size: 22px;
    }

    .keyword-label {
      color: #666;
      font-size: 14px;
      font-weight: 800;
      text-align: left;
    }

    .keyword-value {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      color: #333;
      font-size: 15px;
      font-weight: 900;
      text-align: right;
    }

    .color-dot {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .snack-subtitle {
      margin: -4px 0 18px;
      color: #777;
      font-size: 13px;
      line-height: 1.7;
    }

    .snack-emoji {
      display: block;
      margin-bottom: 8px;
      font-size: 80px;
      line-height: 1;
    }

    .snack-name {
      margin: 0 0 10px;
      color: #f47a20;
      font-size: 23px;
      font-weight: 900;
    }

    .snack-description {
      margin: 0 0 18px;
      color: #777;
      font-size: 13px;
      line-height: 1;
      white-space: pre-line;
      word-break: keep-all;
      overflow-wrap: break-word;
      text-wrap: pretty;
    }

    .snack-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .snack-tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff9a3c, #ff6b2b);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .retry-wrap {
      margin-top: 18px;
    }

    .retry-button:active,
    .start-button:active {
      transform: scale(0.98);
    }

    @media (max-width: 360px) {
      .score-row {
        grid-template-columns: 44px minmax(0, 1fr) 44px;
        gap: 8px;
      }

      .keyword-item {
        grid-template-columns: 30px 52px minmax(0, 1fr);
      }
    }

    .fortune-header {
      position: relative;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 24px;
      padding-top: 10px;
    }

    .header-cookie {
      position: relative;
      z-index: 2;
      display: block;
      font-size: 100px;
      line-height: 1;
      filter: drop-shadow(0 10px 10px rgba(163, 111, 18, 0.18));
      animation: cookieFloat 3.8s ease-in-out infinite;
    }

    .header-stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .header-star {
      position: absolute;
      display: block;
      line-height: 1;
      opacity: 0.35;
      animation: starTwinkle 2.2s ease-in-out infinite;
    }

    .header-star:nth-child(1)  { top: 12px;  left: 13%; font-size: 22px; animation-delay: 0s; }
    .header-star:nth-child(2)  { top: 28px;  right: 13%; font-size: 28px; animation-delay: .35s; }
    .header-star:nth-child(3)  { top: 78px;  left: 5%;  font-size: 20px; animation-delay: .7s; }
    .header-star:nth-child(4)  { top: 92px;  right: 5%; font-size: 24px; animation-delay: 1.05s; }
    .header-star:nth-child(5)  { top: 142px; left: 14%; font-size: 18px; animation-delay: 1.4s; }
    .header-star:nth-child(6)  { top: 148px; right: 15%; font-size: 22px; animation-delay: 1.75s; }
    .header-star:nth-child(7)  { top: 3px;   left: 38%; font-size: 17px; animation-delay: .5s; }
    .header-star:nth-child(8)  { top: 8px;   right: 36%; font-size: 19px; animation-delay: 1.2s; }
    .header-star:nth-child(9)  { top: 108px; left: 25%; font-size: 16px; animation-delay: 1.9s; }
    .header-star:nth-child(10) { top: 112px; right: 24%; font-size: 18px; animation-delay: .9s; }

    @keyframes cookieFloat {
      0%, 100% {
        transform: translateY(0) rotate(-2deg);
      }
      50% {
        transform: translateY(-14px) rotate(2deg);
      }
    }

    @keyframes starTwinkle {
      0%, 100% {
        opacity: 0.25;
        transform: scale(0.75) rotate(0deg);
      }
      50% {
        opacity: 1;
        transform: scale(1.25) rotate(14deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .header-cookie,
      .header-star {
        animation: none;
      }
    }


    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: 0;
      border-radius: 50%;
      filter: blur(18px);
      pointer-events: none;
    }

    body::before {
      width: 240px;
      height: 240px;
      top: 8%;
      left: -90px;
      background: rgba(255, 255, 255, 0.28);
    }

    body::after {
      width: 280px;
      height: 280px;
      right: -120px;
      bottom: 8%;
      background: rgba(255, 170, 40, 0.14);
    }

    
    body{
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,.22) 1.2px, transparent 1.2px),
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.22), transparent 35%);
      background-size:28px 28px,100% 100%;
    }

    .entry-screen,
    .app {
      position: relative;
      z-index: 1;
    }

    .fortune-header::before {
      content: "";
      position:absolute;
      top:14px;
      left:50%;
      width:150px;
      height:150px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,.8),rgba(255,210,120,.25) 55%,transparent 75%);
      filter:blur(4px);
    }

    .card,
    .retry-wrap{
      animation:cardReveal .55s ease both;
    }

    .card:nth-of-type(2){animation-delay:.08s;}
    .card:nth-of-type(3){animation-delay:.16s;}
    .retry-wrap{animation-delay:.24s;}

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>
<body>

  
<section class="entry-screen" id="entryScreen">

        행운 확인하기

      <p id="entryError" class="entry-error" aria-live="polite"></p>

  </section>

  <main id="app" class="app">

          <div class="score-track"><div class="score-fill"></div></div>

    </section>

    <section class="card">

    <section class="card">

      <button id="retryButton" class="retry-button" type="button">
        🎉 운세 다시 보기

    </div>
  </main>

    const randomItem = (array) => array[Math.floor(Math.random() * array.length)];
    const randomScore = () => Math.floor(Math.random() * 71) + 30;

    const entryScreen = document.getElementById("entryScreen");
    const app = document.getElementById("app");
    const phoneInput = document.getElementById("phoneInput");
    const startButton = document.getElementById("startButton");
    const entryError = document.getElementById("entryError");
    const phoneSuffix = document.getElementById("phoneSuffix");
    const retryButton = document.getElementById("retryButton");

    phoneInput.addEventListener("input", () => {
      phoneInput.value = phoneInput.value.replace(/\D/g, "").slice(0, 11);
      entryError.textContent = "";
    });

    function renderFortune() {
      document.getElementById("fortuneText").textContent = randomItem(fortuneMessages);

      document.querySelectorAll(".score-row").forEach((row) => {
        const score = randomScore();
        const fill = row.querySelector(".score-fill");
        const value = row.querySelector(".score-value");

        fill.style.width = "0%";
        value.textContent = `${score}점`;

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            fill.style.width = `${score}%`;
          });
        });
      });

      const selectedColor = randomItem(colors);
      document.getElementById("luckyNumber").textContent =
        Math.floor(Math.random() * 99) + 1;
      document.getElementById("luckyDirection").textContent =
        randomItem(directions);
      document.getElementById("luckyColorName").textContent =
        `${selectedColor.name} (${selectedColor.hex})`;
      document.getElementById("luckyColorDot").style.backgroundColor =
        selectedColor.hex;
      document.getElementById("luckyFood").textContent =
        randomItem(foods);

      const selectedSnack = randomItem(snacks);
      document.getElementById("snackEmoji").textContent =
        selectedSnack.emoji;
      document.getElementById("snackName").textContent =
        selectedSnack.name;
      document.getElementById("snackDescription").textContent =
        selectedSnack.desc;

      const tagContainer = document.getElementById("snackTags");
      tagContainer.innerHTML = "";

      selectedSnack.tags.forEach((tag) => {
        const tagElement = document.createElement("span");
        tagElement.className = "snack-tag";
        tagElement.textContent = tag;
        tagContainer.appendChild(tagElement);
      });
    }

    function startApp() {
      const digits = phoneInput.value.replace(/\D/g, "");

      if (digits.length < 4) {
        entryError.textContent = "전화번호를 4자리 이상 입력해주세요.";
        phoneInput.focus();
        return;
      }

      phoneSuffix.textContent = digits.slice(-4);
      entryScreen.style.display = "none";
      app.classList.add("active");
      renderFortune();
      window.scrollTo(0, 0);
    }

    startButton.addEventListener("click", startApp);

    phoneInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        startApp();
      }
    });

    retryButton.addEventListener("click", () => {
      renderFortune();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
</body>
</html>
